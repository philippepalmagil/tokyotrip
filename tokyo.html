<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tokyo — May 9–16, 2026</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    :root {
      --black: #111;
      --white: #fff;
      --gray: #888;
      --light: #f5f5f3;
      --border: #e8e8e5;
      --accent: #c0392b;
      --panel: 420px;
      --nav: 52px;
      --tabs: 48px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Georgia', serif;
      background: var(--white);
      color: var(--black);
      font-size: 15px;
      line-height: 1.7;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      height: var(--nav);
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
    }

    .nav-logo {
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--black);
    }

    .nav-hint {
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 11px;
      color: #bbb;
      letter-spacing: 0.06em;
    }

    /* ── CITY HEADER (in left panel) ── */
    .city-header {
      padding: 28px 32px 22px;
      background: var(--light);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .city-eyebrow {
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }

    .city-name {
      font-size: 52px;
      font-weight: normal;
      letter-spacing: -0.025em;
      line-height: 1;
      margin-bottom: 8px;
    }

    .city-jp {
      font-size: 13px;
      color: var(--gray);
      font-family: 'Helvetica Neue', sans-serif;
      letter-spacing: 0.18em;
    }

    /* ── STATS ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .stat {
      padding: 16px 20px;
      text-align: center;
      border-right: 1px solid var(--border);
    }

    .stat:last-child { border-right: none; }

    .stat-num {
      display: block;
      font-size: 28px;
      font-weight: normal;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-label {
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gray);
    }

    /* ── APP SHELL ── */
    .app {
      display: flex;
      height: calc(100vh - var(--nav));
      margin-top: var(--nav);
    }

    /* ── LEFT PANEL ── */
    .left {
      width: var(--panel);
      flex-shrink: 0;
      height: 100%;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
    }

    /* ── DAY TABS ── */
    .day-tabs {
      display: flex;
      height: var(--tabs);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      flex-shrink: 0;
      background: var(--white);
      scrollbar-width: none;
    }

    .day-tabs::-webkit-scrollbar { display: none; }

    .day-tab {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.18s;
      border-right: 1px solid var(--border);
      background: none;
      gap: 2px;
    }

    .day-tab:last-child { border-right: none; }

    .day-tab:hover { background: var(--light); }

    .day-tab.active {
      border-bottom-color: var(--black);
      background: var(--white);
    }

    .day-tab.active .tab-num { color: var(--black); }

    .tab-num {
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--gray);
      text-transform: uppercase;
    }

    .tab-date {
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 11px;
      color: #aaa;
      white-space: nowrap;
    }

    .tab-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      margin-top: 2px;
    }

    /* ── DAY PANELS ── */
    .day-panels {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .day-panel {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      padding: 0;
      opacity: 0;
      pointer-events: none;
      transform: translateY(6px);
      transition: opacity 0.2s, transform 0.2s;
    }

    .day-panel.active {
      opacity: 1;
      pointer-events: all;
      transform: translateY(0);
    }

    .day-panel::-webkit-scrollbar { width: 4px; }
    .day-panel::-webkit-scrollbar-track { background: transparent; }
    .day-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── DAY PANEL HEADER ── */
    .panel-header {
      padding: 28px 32px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--light);
    }

    .panel-day-label {
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 6px;
    }

    .panel-title {
      font-size: 22px;
      font-weight: normal;
      letter-spacing: -0.01em;
      line-height: 1.2;
      margin-bottom: 6px;
    }

    .panel-area {
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 12px;
      letter-spacing: 0.06em;
    }

    /* ── PLACE CARDS ── */
    .place-cards { padding: 16px 20px 40px; display: flex; flex-direction: column; gap: 12px; }

    .place-card {
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      transition: border-color 0.18s, box-shadow 0.18s;
      background: var(--white);
    }

    .place-card.active {
      border-color: #aaa;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    .place-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      cursor: pointer;
      border-bottom: 1px solid transparent;
      transition: background 0.15s, border-color 0.15s;
    }

    .place-card.active .place-card-header {
      border-bottom-color: var(--border);
      background: var(--light);
    }

    .place-card-header:hover { background: var(--light); }

    .place-card-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .place-color-bar {
      width: 3px;
      height: 32px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .place-card-name {
      font-size: 17px;
      font-weight: normal;
      letter-spacing: -0.01em;
    }

    .place-card-station {
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 11px;
      color: var(--gray);
      margin-top: 2px;
    }

    .place-map-btn {
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 11px;
      color: var(--gray);
      background: none;
      border: 1px solid var(--border);
      padding: 5px 11px;
      border-radius: 20px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }

    .place-map-btn:hover {
      border-color: var(--black);
      color: var(--black);
    }

    .place-card.active .place-map-btn {
      background: var(--black);
      color: var(--white);
      border-color: var(--black);
    }

    /* ── PLACE CARD BODY ── */
    .place-card-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .place-card.active .place-card-body { max-height: 600px; }

    .place-card-content { padding: 18px 18px 18px 33px; }

    .place-section-label {
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .place-desc {
      font-size: 14px;
      color: #444;
      line-height: 1.8;
      margin-bottom: 16px;
    }

    .place-highlights {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .place-highlight {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .highlight-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }

    .highlight-text {
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 13px;
      color: #444;
      line-height: 1.5;
    }

    .highlight-text strong { color: var(--black); font-weight: 500; }

    /* ── TBD STATE ── */
    .tbd-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      color: #ccc;
      text-align: center;
      padding: 40px;
    }

    .tbd-panel p {
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 13px;
      letter-spacing: 0.06em;
    }

    /* ── RESTAURANT SECTION ── */
    .restaurant-section {
      border-top: 1px solid var(--border);
      margin-top: 4px;
    }

    .restaurant-section-header {
      padding: 14px 20px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .restaurant-section-label {
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gray);
    }

    .restaurant-empty {
      padding: 18px 20px 28px;
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 12px;
      color: #bbb;
      letter-spacing: 0.04em;
      border: 1.5px dashed var(--border);
      border-radius: 4px;
      margin: 0 20px 24px;
      text-align: center;
    }

    .restaurant-area-group { margin-bottom: 4px; }

    .restaurant-area-label {
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #bbb;
      padding: 8px 20px 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .restaurant-area-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .restaurant-cards { padding: 0 20px 20px; display: flex; flex-direction: column; gap: 10px; }

    .rest-card {
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      background: var(--white);
      transition: border-color 0.18s, box-shadow 0.18s;
    }

    .rest-card.active {
      border-color: #aaa;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    .rest-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 16px;
      cursor: pointer;
      border-bottom: 1px solid transparent;
      transition: background 0.15s, border-color 0.15s;
    }

    .rest-card.active .rest-card-header {
      border-bottom-color: var(--border);
      background: #fffaf9;
    }

    .rest-card-header:hover { background: #fffaf9; }

    .rest-card-left { display: flex; align-items: center; gap: 10px; }

    .rest-fork {
      font-size: 14px;
      flex-shrink: 0;
      opacity: 0.7;
    }

    .rest-card-name {
      font-size: 15px;
      font-weight: normal;
      letter-spacing: -0.01em;
    }

    .rest-card-meta {
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 11px;
      color: var(--gray);
      margin-top: 2px;
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .rest-price {
      color: #b7860b;
      font-weight: 500;
    }

    .rest-card-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .rest-card.active .rest-card-body { max-height: 400px; }

    .rest-card-content { padding: 16px 16px 16px 16px; }

    .rest-desc {
      font-size: 13px;
      color: #444;
      line-height: 1.75;
      margin-bottom: 12px;
    }

    .rest-details {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .rest-detail-row {
      display: flex;
      gap: 8px;
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 12px;
      color: #555;
    }

    .rest-detail-icon { flex-shrink: 0; }

    /* ── RIGHT PANEL (MAP) ── */
    .right { flex: 1; height: 100%; position: relative; }
    #tokyo-map { width: 100%; height: 100%; }

    /* ── MAP CONTROL BUTTONS ── */
    .map-controls {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 500;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .map-ctrl-btn {
      background: rgba(255,255,255,0.94);
      backdrop-filter: blur(8px);
      border: 1.5px solid var(--border);
      padding: 7px 16px;
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gray);
      border-radius: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
      transition: all 0.18s;
    }

    .map-ctrl-btn:hover { border-color: #aaa; color: var(--black); }
    .map-ctrl-btn.on { border-color: var(--black); color: var(--black); }

    .ctrl-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      opacity: 0.45;
      transition: opacity 0.18s;
      flex-shrink: 0;
    }

    .map-ctrl-btn.on .ctrl-dot { opacity: 1; }

    /* ── LEAFLET POPUP ── */
    .leaflet-popup-content-wrapper {
      border-radius: 3px !important;
      box-shadow: 0 4px 24px rgba(0,0,0,0.13) !important;
      padding: 0 !important;
      overflow: hidden;
    }

    .leaflet-popup-content { margin: 0 !important; }

    .map-popup { padding: 20px 22px; min-width: 220px; }

    .map-popup-day {
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 5px;
      font-weight: 600;
    }

    .map-popup-name {
      font-size: 18px;
      font-family: 'Georgia', serif;
      margin-bottom: 14px;
      color: #111;
    }

    .map-popup-row {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      margin-bottom: 6px;
    }

    .map-popup-icon { font-size: 13px; flex-shrink: 0; margin-top: 1px; }

    .map-popup-text {
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 12.5px;
      color: #444;
      line-height: 1.5;
    }

    .map-popup-text strong { color: #111; font-weight: 500; }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      html, body { overflow: auto; }

      /* Stack panels vertically */
      .app { flex-direction: column; height: auto; }

      /* Left panel full width, no side border */
      .left {
        width: 100%;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }

      /* Smaller city heading */
      .city-header { padding: 20px 20px 16px; }
      .city-name { font-size: 38px; }
      .city-eyebrow { margin-bottom: 6px; }

      /* Stats: tighter */
      .stat { padding: 12px 8px; }
      .stat-num { font-size: 22px; }

      /* Tabs: taller for easier tapping */
      .day-tabs { height: 56px; }
      .day-tab { padding: 0 14px; }
      .tab-num { font-size: 10px; }
      .tab-date { font-size: 10px; }

      /* Day panels: enough height to scroll comfortably */
      .day-panels { min-height: 65vh; overflow: visible; }
      .day-panel {
        position: static;
        opacity: 1;
        pointer-events: all;
        transform: none;
        display: none;
      }
      .day-panel.active { display: block; }

      /* Panel header tighter */
      .panel-header { padding: 20px 20px 14px; }
      .panel-title { font-size: 19px; }

      /* Place cards: bigger tap targets */
      .place-cards { padding: 12px 14px 28px; gap: 10px; }
      .place-card-header { padding: 14px 14px; min-height: 56px; }
      .place-card-content { padding: 16px 14px 16px 26px; }

      /* Restaurant cards: bigger tap targets */
      .restaurant-section-header { padding: 12px 14px 8px; }
      .restaurant-cards { padding: 0 14px 16px; }
      .rest-card-header { padding: 14px 14px; min-height: 52px; }
      .rest-card-content { padding: 14px; }
      .restaurant-area-label { padding: 8px 14px 4px; }

      /* Map: good height below the itinerary */
      .right { height: 70vw; min-height: 300px; max-height: 480px; flex: none; }

      /* Map controls: move to top so they're visible without scrolling deep */
      .map-controls {
        bottom: auto;
        top: 14px;
        gap: 6px;
      }

      /* Nav: smaller text */
      .nav-hint { display: none; }
      .nav-logo { font-size: 11px; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <span class="nav-logo">Tokyo &nbsp;·&nbsp; May 2026</span>
    <span class="nav-hint">Click a place to see it on the map</span>
  </nav>

  <!-- APP -->
  <div class="app">

    <!-- LEFT PANEL -->
    <div class="left">

      <!-- CITY HEADER (fixed) -->
      <div class="city-header">
        <p class="city-eyebrow">May 9 – 16, 2026</p>
        <h1 class="city-name">Tokyo</h1>
        <p class="city-jp">東京</p>
      </div>

      <!-- STATS (fixed) -->
      <div class="stats">
        <div class="stat">
          <span class="stat-num">8</span>
          <span class="stat-label">Days</span>
        </div>
        <div class="stat">
          <span class="stat-num">8</span>
          <span class="stat-label">Places</span>
        </div>
        <div class="stat">
          <span class="stat-num">1</span>
          <span class="stat-label">Day Trip</span>
        </div>
      </div>

      <!-- DAY TABS (fixed) -->
      <div class="day-tabs" id="dayTabs"></div>

      <!-- DAY PANELS (scrollable) -->
      <div class="day-panels" id="dayPanels"></div>

    </div>

    <!-- RIGHT: MAP -->
    <div class="right">
      <div id="tokyo-map"></div>
      <div class="map-controls">
        <button class="map-ctrl-btn on" id="areaToggle" onclick="toggleAreas()">
          <span class="ctrl-dot" style="background:#c0392b;"></span>
          Popular Areas
        </button>
        <button class="map-ctrl-btn" id="restToggle" onclick="toggleRestaurants()">
          <span class="ctrl-dot" style="background:#e87722;"></span>
          Restaurants
        </button>
      </div>
    </div>

  </div>

  <script>
    // ─────────────────────────────────────────
    // ITINERARY DATA
    // ─────────────────────────────────────────
    const days = [
      {
        id: 1,
        date: "May 9",

      {

        places: [
          {

            line: "Ginza / Chiyoda / Hanzomon Lines",
            walk: "2 min walk",
            desc: "Often called Tokyo's Champs-Élysées — a wide, tree-lined boulevard of flagship stores, concept boutiques, and excellent cafés. The contrast with Takeshita Street, just 10 minutes away, is striking.",
            highlights: [
              { icon: "🏛️", title: "Prada & flagship architecture", note: "Herzog & de Meuron's Prada building and Tadao Ando's Omotesando Hills are worth seeing as architecture alone." },
              { icon: "☕", title: "Café culture", note: "Some of Tokyo's best third-wave coffee here — Omotesando Koffee and Streamer Coffee are both excellent." },
              { icon: "🛍️", title: "Side streets", note: "The small streets branching off Omotesando (called Urahara) have the most interesting independent boutiques." },
            ]
          },
          {
            name: "Nakameguro",
            lat: 35.6450, lng: 139.6980,
            station: "Nakameguro Station",

    // ─────────────────────────────────────────

    const tabsEl = document.getElementById('dayTabs');
    const panelsEl = document.getElementById('dayPanels');

    days.forEach((day, i) => {
      // TAB
      const tab = document.createElement('button');
      tab.className = 'day-tab' + (i === 0 ? ' active' : '');
      tab.dataset.day = day.id;
      tab.innerHTML = `
        <span class="tab-num">${day.label}</span>
        <span class="tab-date">${day.date}</span>
        ${day.color ? `<span class="tab-dot" style="background:${day.color};"></span>` : '<span class="tab-dot" style="background:transparent;"></span>'}
      `;
      tab.addEventListener('click', () => switchDay(day.id));
      tabsEl.appendChild(tab);

      // PANEL
      const panel = document.createElement('div');
      panel.className = 'day-panel' + (i === 0 ? ' active' : '');
      panel.id = `panel-${day.id}`;

      if (day.tbd) {
        panel.innerHTML = `
          <div class="tbd-panel">
            <span style="font-size:32px;">✦</span>
            <p>More places coming soon</p>
          </div>`;
      } else if (day.places.length === 0) {
        // Arrival or departure
        const msgs = {
          1: 'Touch down, grab your Suica card, and settle in. A walk and a bowl of ramen is all you need tonight.',
          8: 'A final kissaten breakfast, one last walk, then the Narita Express from Shinjuku Station (~90 min to airport). いってらっしゃい。'
        };
        panel.innerHTML = `
          <div class="panel-header">
            <p class="panel-day-label">${day.label} · ${day.date}</p>
            <h2 class="panel-title">${day.title}</h2>
          </div>
          <div style="padding: 28px 32px; font-size:14px; color:#555; line-height:1.8;">
            ${msgs[day.id] || ''}
          </div>`;
      } else {
        const areaHTML = day.area
          ? `<p class="panel-area" style="color:${day.color};">${day.area}</p>`
          : '';
        const cardsHTML = day.places.map(p => `
          <div class="place-card" id="card-${p.name.replace(/\s+/g,'-')}">
            <div class="place-card-header" onclick="toggleCard('${p.name}')">
              <div class="place-card-left">
                <div class="place-color-bar" style="background:${day.color};"></div>

    // ─────────────────────────────────────────
    // MAP SETUP
    // ─────────────────────────────────────────
    const map = L.map('tokyo-map', {
      center: [35.672, 139.700],
      zoom: 12,
      zoomControl: true,
      scrollWheelZoom: true,
    });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
      subdomains: 'abcd', maxZoom: 19,
    }).addTo(map);

    function makeIcon(color, size = 13) {
      return L.divIcon({
        className: '',
        html: `<div style="width:${size}px;height:${size}px;background:${color};border:2.5px solid white;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.28);"></div>`,
        iconSize: [size, size], iconAnchor: [size/2, size/2], popupAnchor: [0, -(size/2+6)]
      });
    }

    const markerIndex = {};

    days.forEach(day => {
      if (!day.places) return;
      day.places.forEach(p => {
        const popup = `
          <div class="map-popup">
            <div class="map-popup-day" style="color:${day.color};">${day.label} · ${day.date}</div>
            <div class="map-popup-name">${p.name}</div>
            <div class="map-popup-row">
              <span class="map-popup-icon">🚉</span>
              <div class="map-popup-text"><strong>${p.station}</strong><br>${p.line}</div>
            </div>
            <div class="map-popup-row">
              <span class="map-popup-icon">🚶</span>
              <div class="map-popup-text">${p.walk} from station</div>
            </div>
          </div>`;

        const marker = L.marker([p.lat, p.lng], { icon: makeIcon(day.color) })
          .bindPopup(popup, { maxWidth: 280, closeButton: false })
          .addTo(map);

        markerIndex[p.name] = { marker, day, place: p };
      });
    });

    // ─────────────────────────────────────────
    // SWITCH DAY TAB
    // ─────────────────────────────────────────
    let activeDay = 1;

    function switchDay(dayId) {
      // Update tabs
      document.querySelectorAll('.day-tab').forEach(t => {
        t.classList.toggle('active', parseInt(t.dataset.day) === dayId);
      });
      // Update panels
      document.querySelectorAll('.day-panel').forEach(p => {
        p.classList.toggle('active', p.id === `panel-${dayId}`);
      });

      activeDay = dayId;
      map.closePopup();

      // Fit map to this day's places
      const day = days.find(d => d.id === dayId);
      if (day && day.places && day.places.length > 0) {
        const latlngs = day.places.map(p => [p.lat, p.lng]);
        if (latlngs.length === 1) {
          map.flyTo(latlngs[0], 14, { duration: 0.7 });
        } else {
          map.flyToBounds(L.latLngBounds(latlngs).pad(0.35), { duration: 0.7 });
        }
      } else {
        map.flyTo([35.672, 139.700], 12, { duration: 0.7 });
      }

      // Reset all card active states
      document.querySelectorAll('.place-card').forEach(c => c.classList.remove('active'));
    }

    // ─────────────────────────────────────────
    // TOGGLE PLACE CARD EXPAND
    // ─────────────────────────────────────────
    function toggleCard(name) {
      const cardId = `card-${name.replace(/\s+/g,'-')}`;
      const card = document.getElementById(cardId);
      if (!card) return;
      const wasActive = card.classList.contains('active');
      // Close all cards in current panel
      document.querySelectorAll('.place-card').forEach(c => c.classList.remove('active'));
      if (!wasActive) card.classList.add('active');
    }

    // ─────────────────────────────────────────
    // FOCUS PLACE ON MAP
    // ─────────────────────────────────────────
    function focusPlace(name) {
      const entry = markerIndex[name];
      if (!entry) return;
      const { marker, place, day } = entry;

      // Reset all marker sizes
      Object.values(markerIndex).forEach(e => {
        e.marker.setIcon(makeIcon(e.day.color, 13));
      });
      // Enlarge focused marker
      marker.setIcon(makeIcon(day.color, 20));

      map.flyTo([place.lat, place.lng], 17, { duration: 1.1 });
      setTimeout(() => marker.openPopup(), 1000);

      // Also expand the card
      const cardId = `card-${name.replace(/\s+/g,'-')}`;
      document.querySelectorAll('.place-card').forEach(c => c.classList.remove('active'));
      const card = document.getElementById(cardId);
      if (card) card.classList.add('active');
    }

      { name: "Kichijoji",      lat: 35.7036, lng: 139.5797, r: 420 },
      { name: "Yanaka",         lat: 35.7220, lng: 139.7650, r: 330 },
      { name: "Odaiba",         lat: 35.6262, lng: 139.7760, r: 680 },
      { name: "Marunouchi",     lat: 35.6812, lng: 139.7671, r: 380 },
      { name: "Daikanyama",     lat: 35.6484, lng: 139.7025, r: 260 },
    ];

    const areaLayer = L.layerGroup();

    areas.forEach(a => {
      // Shaded circle
      L.circle([a.lat, a.lng], {
        radius: a.r,
        color: '#c0392b',
        weight: 1,
        opacity: 0.18,
        fillColor: '#c0392b',
        fillOpacity: 0.05,
        interactive: false,
        pane: 'shadowPane',
      }).addTo(areaLayer);

      // Text label
      L.marker([a.lat, a.lng], {
        icon: L.divIcon({
          className: '',
          html: `<div style="
            font-family:'Helvetica Neue',sans-serif;
            font-size:10px;
            font-weight:700;
            letter-spacing:0.12em;
            text-transform:uppercase;
            color:rgba(140,50,40,0.75);
            white-space:nowrap;
            text-shadow:
              0 0 6px rgba(255,255,255,1),
              0 0 6px rgba(255,255,255,1),
              0 0 10px rgba(255,255,255,0.9);
          ">${a.name}</div>`,
          iconSize: [140, 16],
          iconAnchor: [70, 8],
        }),
        interactive: false,
        zIndexOffset: -200,
      }).addTo(areaLayer);
    });

    // Start with areas visible
    areaLayer.addTo(map);
    let areasOn = true;

    function toggleAreas() {
      const btn = document.getElementById('areaToggle');
      if (areasOn) {
        map.removeLayer(areaLayer);
        btn.classList.remove('on');
      } else {
        map.addLayer(areaLayer);
        btn.classList.add('on');
      }
      areasOn = !areasOn;
    }

    // ─────────────────────────────────────────
    // RESTAURANT MAP MARKERS
    // ─────────────────────────────────────────
    const restLayer = L.layerGroup();
    let restsOn = false;
    const restMarkerIndex = {};

    function makeRestIcon(size = 13, active = false) {
      const bg = active ? '#c0392b' : '#e87722';
      return L.divIcon({
        className: '',
        html: `<div style="width:${size}px;height:${size}px;background:${bg};border:2px solid white;border-radius:3px;box-shadow:0 2px 8px rgba(0,0,0,0.28);display:flex;align-items:center;justify-content:center;font-size:${Math.max(7,size-4)}px;line-height:1;">🍴</div>`,
        iconSize: [size, size], iconAnchor: [size/2, size/2], popupAnchor: [0, -(size/2+4)]
      });
    }

    days.forEach(day => {
      if (!day.restaurants) return;
      day.restaurants.forEach(group => {
        group.places.forEach(r => {
          const popup = `
            <div class="map-popup">
              <div class="map-popup-day" style="color:#e87722;">${group.area}</div>
              <div class="map-popup-name">${r.name}</div>
              <div class="map-popup-row">
                <span class="map-popup-icon">🍽️</span>
                <div class="map-popup-text"><strong>${r.cuisine}</strong> · <span style="color:#b7860b;">${r.price}</span></div>
              </div>
              <div class="map-popup-row">
                <span class="map-popup-icon">🕐</span>
                <div class="map-popup-text">${r.hours}</div>
              </div>
            </div>`;
          const marker = L.marker([r.lat, r.lng], { icon: makeRestIcon(13) })
            .bindPopup(popup, { maxWidth: 260, closeButton: false })
            .addTo(restLayer);
          restMarkerIndex[r.name] = { marker, lat: r.lat, lng: r.lng };
        });
      });
    });

    function focusRestaurant(name) {
      const entry = restMarkerIndex[name];
      if (!entry) return;

      // Make sure restaurant layer is visible
      if (!restsOn) {
        map.addLayer(restLayer);
        restsOn = true;
        document.getElementById('restToggle').classList.add('on');
      }

      // Reset all restaurant markers
      Object.values(restMarkerIndex).forEach(e => e.marker.setIcon(makeRestIcon(13, false)));
      // Enlarge focused marker
      entry.marker.setIcon(makeRestIcon(20, true));

      map.flyTo([entry.lat, entry.lng], 17, { duration: 1.1 });
      setTimeout(() => entry.marker.openPopup(), 1000);
    }

    function toggleRestaurants() {
      const btn = document.getElementById('restToggle');
      if (restsOn) {
        map.removeLayer(restLayer);
        btn.classList.remove('on');
      } else {
        map.addLayer(restLayer);
        btn.classList.add('on');
      }
      restsOn = !restsOn;
    }

    // ─────────────────────────────────────────
    // RESTAURANT CARD TOGGLE
    // ─────────────────────────────────────────
    function toggleRestCard(name) {
      const id = `rest-${name.replace(/[^a-zA-Z0-9]/g,'-')}`;
      const card = document.getElementById(id);
      if (!card) return;
      const wasActive = card.classList.contains('active');
      document.querySelectorAll('.rest-card').forEach(c => c.classList.remove('active'));
      if (!wasActive) card.classList.add('active');
    }

    // Reset marker sizes when any popup closes
    map.on('popupclose', () => {
      Object.values(markerIndex).forEach(e => e.marker.setIcon(makeIcon(e.day.color, 13)));
      Object.values(restMarkerIndex).forEach(e => e.marker.setIcon(makeRestIcon(13, false)));
    });

    // Initialise: fit map to day 1 (no places, so show Tokyo overview)
    // Start on day 2 to show places right away
    switchDay(2);
  </script>

</body>
</html>
